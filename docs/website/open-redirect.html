<!doctype html>
<!--
  gistlist.app/open — Deep-link redirect page.

  The Gistlist MCP server emits citation links of the form:
    https://gistlist.app/open?m=<run_id>&t=<ms>
    https://gistlist.app/open?m=<run_id>&s=<summary|prep|notes|transcript>

  This page bounces the user to the `gistlist://` URL scheme, which the
  installed Gistlist.app registers as a handler. If the app isn't
  installed (or nothing handles the scheme), the fallback copy below
  stays on screen with a download link.

  Drop this file at https://gistlist.app/open (or /open/index.html).
  No build step, no runtime deps.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening Gistlist…</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f2;
        --text: #1b1c1a;
        --text-secondary: #6b6d68;
        --accent: #d8542d;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #1b1c1a;
          --text: #f6f7f2;
          --text-secondary: #a8aaa3;
        }
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        max-width: 30rem;
        padding: 2rem 1.5rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--text-secondary);
      }
      a.btn {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.5rem 1rem;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        border-radius: 6px;
        font-weight: 500;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.9em;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening Gistlist…</h1>
      <p id="status">If nothing happens, Gistlist may not be installed yet.</p>
      <p>
        <a class="btn" href="https://gistlist.app/download">Download Gistlist</a>
      </p>
      <p>
        <a id="manual" href="#" style="color: var(--text-secondary)">
          Retry opening in Gistlist
        </a>
      </p>
    </main>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const runId = params.get("m");
        const t = params.get("t");
        const source = params.get("s");

        if (!runId) {
          document.getElementById("status").textContent =
            "This link is missing a meeting id.";
          return;
        }

        // Build the gistlist:// URL. Mirror the MCP server's formatCitationLink
        // shape exactly — anything else will 404 in the Gistlist app.
        let deepLink = "gistlist://meeting/" + encodeURIComponent(runId);
        if (t && /^\d+$/.test(t)) {
          deepLink += "?t=" + t;
        } else if (
          source === "summary" ||
          source === "prep" ||
          source === "notes" ||
          source === "transcript"
        ) {
          deepLink += "?source=" + source;
        }

        // Fire immediately. Safari/Chrome both accept window.location assignment
        // to custom schemes as long as it's triggered by user interaction OR
        // it's the initial page navigation (which this is).
        window.location.href = deepLink;

        // Give the user a manual retry in case the automatic redirect got
        // blocked (happens occasionally on iOS or with aggressive extension
        // blockers). Wire after a short delay so the initial redirect has a
        // chance to fire first.
        const manual = document.getElementById("manual");
        manual.setAttribute("href", deepLink);
      })();
    </script>
  </body>
</html>
